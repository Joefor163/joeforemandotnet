# ─────────────────────────────────────────────────────────────────
# Cloudflare Pages — Auto-deploy on push to main
#
# Triggers: every push to main, or manually via GitHub Actions UI
# Required secret: CLOUDFLARE_API_TOKEN (Settings → Secrets → Actions)
# ─────────────────────────────────────────────────────────────────

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Create Pages project if it doesn't exist
        run: |
          wrangler pages project create joeforemandotnet \
            --production-branch=main 2>&1 || echo "Project already exists, continuing."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 246683d64f4cbf0279f0e414299d5bb9

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy . \
            --project-name=joeforemandotnet \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 246683d64f4cbf0279f0e414299d5bb9
